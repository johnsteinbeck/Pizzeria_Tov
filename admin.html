<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Pizzeria Tov yönetici paneli - menü ürünleri, fiyatlar ve fotoğraflar."
    />
    <meta name="theme-color" content="#172018" />
    <title>Pizzeria Tov | Yönetim</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body class="admin-page">
    <a class="skip-link" href="#admin" data-i18n="admin.skip">Yönetim paneline geç</a>

    <header class="topbar" aria-label="Pizzeria Tov Yönetim">
      <a class="brand-mark" href="index.html#menu" aria-label="Pizzeria Tov menüye dön">
        <span class="brand-seal" aria-hidden="true">PT</span>
        <span>Pizzeria Tov</span>
      </a>

      <nav class="desktop-nav" aria-label="Yönetim navigasyonu">
        <a href="index.html#menu" data-i18n="nav.menu">Menü</a>
        <a href="#admin" data-i18n="nav.admin">Yönetim</a>
        <a href="index.html#visit" data-i18n="nav.visit">İletişim</a>
      </nav>

      <div class="language-switch" aria-label="Dil seçimi">
        <button class="language-button is-active" type="button" data-language="tr" aria-pressed="true">
          TR
        </button>
        <button class="language-button" type="button" data-language="en" aria-pressed="false">
          EN
        </button>
      </div>
    </header>

    <main>
      <section class="admin-panel section-pad first-section" id="admin">
        <div class="admin-shell">
          <div class="section-intro admin-intro">
            <p class="eyebrow" data-i18n="admin.eyebrow">Area riservata</p>
            <h1 data-i18n="admin.title">Yönetici paneli</h1>
            <p data-i18n="admin.copy">
              Yeni pizza ekleyin, fiyatları güncelleyin ve ürün fotoğraflarını düzenleyin.
            </p>
          </div>

          <div class="admin-grid">
            <form class="admin-card" id="addPizzaForm">
              <div class="admin-card-heading">
                <span data-i18n="admin.addKicker">Nuova pizza</span>
                <h3 data-i18n="admin.addTitle">Yeni ürün ekle</h3>
              </div>

              <div class="admin-field-grid">
                <label>
                  <span data-i18n="admin.nameLabel">Ürün adı</span>
                  <input id="newPizzaName" type="text" placeholder="No:4 / Funghi" required />
                </label>
                <label>
                  <span data-i18n="admin.priceLabel">Fiyat</span>
                  <input id="newPizzaPrice" type="text" placeholder="520 ₺" required />
                </label>
              </div>

              <div class="admin-field-grid">
                <label>
                  <span data-i18n="admin.categoryLabel">Kategori</span>
                  <select id="newPizzaCategory">
                    <option value="napoli" data-i18n="admin.categoryNapoli">Napoli Pizzaları</option>
                    <option value="drinks" data-i18n="admin.categoryDrinks">İçecekler</option>
                  </select>
                </label>
                <label>
                  <span data-i18n="admin.groupLabel">Menü başlığı</span>
                  <select id="newPizzaGroup">
                    <option value="chef" data-i18n="admin.groupChef">Şefin önerisi</option>
                    <option value="signature" data-i18n="admin.groupSignature">İmza Pizzalar</option>
                  </select>
                </label>
              </div>

              <label>
                <span data-i18n="admin.ingredientsLabel">İçerikler</span>
                <textarea id="newPizzaIngredients" rows="5" placeholder="San Marzano domates&#10;Fesleğen&#10;Parmesan" required></textarea>
              </label>

              <label class="file-field">
                <span data-i18n="admin.photoFileLabel">Fotoğraf dosyası</span>
                <input id="newPizzaFile" type="file" accept="image/*" />
              </label>

              <button class="button button-primary" type="submit" data-i18n="admin.addButton">Ürünü Ekle</button>
            </form>

            <form class="admin-card" id="priceUpdateForm">
              <div class="admin-card-heading">
                <span data-i18n="admin.priceKicker">Prezzo</span>
                <h3 data-i18n="admin.priceTitle">Fiyat güncelle</h3>
              </div>

              <label>
                <span data-i18n="admin.productLabel">Ürün seç</span>
                <select id="priceItemSelect"></select>
              </label>

              <label>
                <span data-i18n="admin.newPriceLabel">Yeni fiyat</span>
                <input id="updatedPrice" type="text" placeholder="570 ₺" required />
              </label>

              <button class="button button-secondary" type="submit" data-i18n="admin.priceButton">Fiyatı Güncelle</button>
            </form>

            <form class="admin-card" id="photoUpdateForm">
              <div class="admin-card-heading">
                <span data-i18n="admin.photoKicker">Fotografia</span>
                <h3 data-i18n="admin.photoTitle">Fotoğraf ekle</h3>
              </div>

              <label>
                <span data-i18n="admin.productLabel">Ürün seç</span>
                <select id="photoItemSelect"></select>
              </label>

              <label class="file-field">
                <span data-i18n="admin.photoFileLabel">Fotoğraf dosyası</span>
                <input id="updatedPhotoFile" type="file" accept="image/*" />
              </label>

              <button class="button button-secondary" type="submit" data-i18n="admin.photoButton">Fotoğrafı Güncelle</button>
            </form>

            <form class="admin-card admin-danger-card" id="deletePizzaForm">
              <div class="admin-card-heading">
                <span data-i18n="admin.deleteKicker">Rimuovi</span>
                <h3 data-i18n="admin.deleteTitle">Pizza sil</h3>
              </div>

              <label>
                <span data-i18n="admin.productLabel">Ürün seç</span>
                <select id="deleteItemSelect"></select>
              </label>

              <button class="button button-danger" type="submit" data-i18n="admin.deleteButton">Seçili Ürünü Sil</button>
            </form>
          </div>

          <div class="admin-actions">
            <button class="button button-tertiary" id="resetMenuButton" type="button" data-i18n="admin.resetButton">
              Varsayılan Menüye Dön
            </button>
            <a class="button button-tertiary" href="index.html#menu" data-i18n="admin.backToMenu">
              Menüye Dön
            </a>
            <p class="admin-status" id="adminStatus" role="status" aria-live="polite"></p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
